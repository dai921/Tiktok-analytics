version: '3'

services:
  frontend:
    build:
      context: .
      args:
        # バックエンドサービス名を使用
        NEXT_PUBLIC_API_URL: http://localhost:8090
    ports:
      - "3030:3030"
    depends_on:
      - backend
    environment:
      - PORT=3030
      - HOSTNAME=0.0.0.0

  backend:
    build:
      context: ./backend/emulator/api
    ports:
      - "8090:8080"  # ホストの8090をコンテナの8080にマッピング
    environment:
      - PORT=8080
      - MYSQL_HOST=host.docker.internal
      - MYSQL_USER=tiktok_user
      - MYSQL_PASSWORD=tiktok_pass
      - MYSQL_DATABASE=tiktok_data
      - MYSQL_PORT=3306
      - ALLOWED_ORIGINS=http://localhost:3030
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    driver: bridge 