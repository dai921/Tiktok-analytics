apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-crawler
spec:
  replicas: 2  # 必要に応じて調整
  selector:
    matchLabels:
      app: account-crawler
  template:
    metadata:
      labels:
        app: account-crawler
    spec:
      containers:
      - name: account-crawler
        image: gcr.io/プロジェクトID/account-crawler:latest
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: PROJECT_ID
          value: "プロジェクトID"
        - name: MYSQL_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database
        volumeMounts:
        - name: google-cloud-key
          mountPath: /var/secrets/google
          readOnly: true
      volumes:
      - name: google-cloud-key
        secret:
          secretName: pubsub-key 