  # update-all-categories
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-update-all-categories'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'update-all-categories'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=update_all_categories'
      - '--trigger-http'
      - '--no-allow-unauthenticated'
      - '--memory=1024MB'
      - '--timeout=3600s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

options:
  logging: CLOUD_LOGGING_ONLY


