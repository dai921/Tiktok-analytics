      - gcloud
      - functions
      - deploy
      - frontend-affiliate-update
      - --gen2
      - --runtime=python310
      - --region=asia-northeast1
      - --source=.
      - --entry-point=frontend_affiliate_update_job
      - --trigger-topic=frontend-affiliate-trigger
      - --memory=256MB
