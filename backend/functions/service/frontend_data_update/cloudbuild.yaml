# Cloud Functionsデプロイ用のCloud Build構成
steps:
  # 共通ユーティリティファイルのコピー（後続のすべてのデプロイで使用）
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'prepare-environment'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "ENVIRONMENT=production" > .env
  # frontend-update
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend-update'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'frontend-update'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=frontend_update_job'
      - '--trigger-topic=frontend-data-update-trigger'
      - '--no-allow-unauthenticated'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # frontend-update-trigger
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend-update-trigger'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'frontend-update-trigger'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=frontend_update_trigger_function'
      - '--trigger-http'
      - '--no-allow-unauthenticated'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

# frontend-affiliate-update
