# Cloud Functionsデプロイ用のCloud Build構成
steps:
  # 共通ユーティリティファイルのコピー（後続のすべてのデプロイで使用）
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'prepare-environment'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "ENVIRONMENT=production" > .env
  # frontend-update
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend-update'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'frontend-update'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=frontend_update_job'
      - '--trigger-topic=frontend-data-update-trigger'
      - '--no-allow-unauthenticated'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # frontend-update-trigger
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend-update-trigger'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'frontend-update-trigger'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=frontend_update_trigger_function'
      - '--trigger-http'
      - '--no-allow-unauthenticated'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'


  # sync-category-spreadsheet
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-sync-category-spreadsheet'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'sync-category-spreadsheet'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=sync_category_job'
      - '--trigger-http'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,SPREADSHEET_CATEGORY_ID=1u7Q2HQ0x5KDmuwn3MLFCurXrx-ysWaaD3sSz695tjFk,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # sync-category-spreadsheet のスケジュール設定
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'create-sync-category-schedule'
    waitFor: ['deploy-sync-category-spreadsheet']
    args:
      - 'bash'
      - '-c'
      - |
        # デプロイされた関数の情報を取得
        FUNCTION_URL=$$(gcloud functions describe sync-category-spreadsheet --gen2 --region=asia-northeast1 --format='value(serviceConfig.uri)' --project=tiktok-analytics-prod-451609)
        if [ -z "$$FUNCTION_URL" ]; then
          echo "エラー: sync-category-spreadsheet 関数のURLを取得できませんでした"
          exit 1
        fi
        
        echo "sync-category-spreadsheet 関数のURL: $$FUNCTION_URL"
        
        # ジョブが存在するか確認
        if gcloud scheduler jobs describe sync-category-schedule --location=asia-northeast1 --project=tiktok-analytics-prod-451609 2>/dev/null; then
          echo "スケジュールジョブ sync-category-schedule は既に存在します。更新します。"
          gcloud scheduler jobs update http sync-category-schedule \
            --location=asia-northeast1 \
            --schedule="0 0 * * *" \
            --uri="$$FUNCTION_URL" \
            --http-method=POST \
            --time-zone="Asia/Tokyo" \
            --attempt-deadline=540s \
            --oidc-service-account-email=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com \
            --project=tiktok-analytics-prod-451609
        else
          echo "スケジュールジョブ sync-category-schedule を新規作成します。"
          gcloud scheduler jobs create http sync-category-schedule \
            --location=asia-northeast1 \
            --schedule="0 0 */1 * *" \
            --uri="$$FUNCTION_URL" \
            --http-method=POST \
            --time-zone="Asia/Tokyo" \
            --attempt-deadline=540s \
            --oidc-service-account-email=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com \
            --project=tiktok-analytics-prod-451609
        fi

  # video-master-sync
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-video-master-sync'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'video-master-sync'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=sync_raw_data_to_video_master'
      - '--trigger-topic=video-master-sync'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,BUCKET_NAME=tiktok-data-bucket,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # batch-scheduler
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-batch-scheduler'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'batch-scheduler'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=batch_scheduler_function'
      - '--trigger-topic=frontend-update-status'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609'

  # category-analytics-aggregator
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-category-analytics-aggregator'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'category-analytics-aggregator'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=category_analytics_function'
      - '--trigger-topic=frontend-analytics-trigger'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # update-all-categories
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-update-all-categories'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'update-all-categories'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=update_all_categories'
      - '--trigger-http'
      - '--no-allow-unauthenticated'
      - '--memory=1024MB'
      - '--timeout=3600s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # video-history-sync
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-video-history-sync'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'video-history-sync'
      - '--gen2'
      - '--runtime=python310'
      - '--region=asia-northeast1'
      - '--source=.'
      - '--entry-point=sync_video_history'
      - '--trigger-topic=video-history-sync'
      - '--memory=512MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # batch-sync-scheduler関数のデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - functions
      - deploy
      - batch-sync-scheduler
      - --gen2
      - --runtime=python39
      - --region=asia-northeast1
      - --source=.
      - --entry-point=batch_sync_scheduler_function
      - --trigger-topic=video-url-sync-status
      - --memory=256MB
      - --timeout=540s
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'
    id: 'deploy-batch-sync-scheduler'

# batch-category-scheduler関数のデプロイ
