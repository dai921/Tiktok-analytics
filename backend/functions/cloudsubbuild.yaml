steps:
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'prepare-env'
  entrypoint: bash
  args: ['-c', 'echo ENVIRONMENT=production > .env']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-manual-sync-master-raw-data'
  waitFor: ['prepare-env']
  args:
    - gcloud
    - functions
    - deploy
    - manual-sync-master-raw-data
    - --gen2
    - --runtime=python39
    - --region=asia-northeast1
    - --source=.
    - --entry-point=manual_sync_master_raw_data
    - --trigger-http
    - --memory=256MB
    - --timeout=540s
    - --service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com
    - --set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db,BUCKET_NAME=tiktok-data-bucket
options:
  logging: CLOUD_LOGGING_ONLY
