steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-product-determination
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud functions deploy product-determination \
          --gen2 \
          --runtime=python311 \
          --region=asia-northeast1 \
          --source=. \
          --entry-point=determine_beauty_product \
          --trigger-topic=influencer-pr-product-determination \
          --allow-unauthenticated \
          --memory=2048MB \
          --timeout=540s \
          --service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com \
          --set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,CLOUD_STORAGE_BUCKET=tiktok-videos-storage,TRANSCRIPTION_FUNCTION_URL=https://asia-northeast1-tiktok-analytics-prod-451609.cloudfunctions.net/video-transcription-processor,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db \
          --set-secrets=GEMINI_API_KEY=projects/tiktok-analytics-prod-451609/secrets/gemini-api-key/versions/latest
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 3600s