# Cloud Functionsデプロイ用のCloud Build構成
steps:
  # 共通ユーティリティファイルのコピー（後続のすべてのデプロイで使用）
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'prepare-environment'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "ENVIRONMENT=production" > .env

  # tiktok-video-downloader
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-tiktok-video-downloader'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'tiktok-video-downloader'
      - '--gen2'
      - '--runtime=python311'
      - '--region=asia-northeast1'
      - '--source=tiktok-video-downloader'
      - '--entry-point=download_tiktok_video'
      - '--trigger-http'
      - '--allow-unauthenticated'
      - '--memory=2048MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,CLOUD_STORAGE_BUCKET=tiktok-videos-storage,TRANSCRIPTION_FUNCTION_URL=https://asia-northeast1-tiktok-analytics-prod-451609.cloudfunctions.net/video-transcription-processor,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

  # video-transcription-processor
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-video-transcription-processor'
    waitFor: ['prepare-environment']
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'video-transcription-processor'
      - '--gen2'
      - '--runtime=python311'
      - '--region=asia-northeast1'
      - '--source=video-transcription-processor'
      - '--entry-point=process_video_transcription'
      - '--trigger-http'
      - '--allow-unauthenticated'
      - '--memory=2048MB'
      - '--timeout=540s'
      - '--service-account=cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com'
      - '--set-env-vars=ENVIRONMENT=production,PROJECT_ID=tiktok-analytics-prod-451609,CLOUD_STORAGE_BUCKET=tiktok-videos-storage,GEMINI_API_KEY=AIzaSyACc82TA9iWau8soy38byr6kiZ0ZQj7mYY,INSTANCE_CONNECTION_NAME=tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db'

options:
  logging: CLOUD_LOGGING_ONLY
