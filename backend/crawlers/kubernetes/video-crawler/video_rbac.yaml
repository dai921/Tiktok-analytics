apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: statefulset-scaler
  namespace: video-crawler
rules:
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "patch"]  # StatefulSetの取得と更新権限
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: video-crawler-scaler
  namespace: video-crawler
subjects:
- kind: ServiceAccount
  name: crawler-ksa  # video-crawlerとscale-up-cronjobで使用しているServiceAccount
roleRef:
  kind: Role
  name: statefulset-scaler
  apiGroup: rbac.authorization.k8s.io