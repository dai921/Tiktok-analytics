apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-creator
  namespace: account-crawler
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-creator-binding
  namespace: account-crawler
subjects:
- kind: ServiceAccount
  name: system-ksa
  namespace: system
roleRef:
  kind: Role
  name: job-creator
  apiGroup: rbac.authorization.k8s.io