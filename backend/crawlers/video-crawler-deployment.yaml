apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-crawler
  namespace: crawlers  # 名前空間を追加
spec:
  replicas: 2  # 必要に応じて調整
  selector:
    matchLabels:
      app: video-crawler
  template:
    metadata:
      labels:
        app: video-crawler
    spec:
      serviceAccountName: crawler-ksa  # 正しいサービスアカウント名に修正
      containers:
      - name: video-crawler
        image: asia-northeast1-docker.pkg.dev/tiktok-analytics-prod-451609/tiktok-crawlers/video-crawler:v1
        env:
        - name: CRAWLER_TYPE
          value: "video_crawler"
        - name: PROJECT_ID
          value: "tiktok-analytics-prod-451609"
        - name: BUCKET_NAME
          value: "tiktok-analytics-data"
        - name: GOOGLE_CLOUD_PROJECT
          value: "tiktok-analytics-prod-451609"
        # MySQLの接続情報（Secret経由で設定）
        - name: MYSQL_HOST
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: host
        - name: MYSQL_PORT
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: port
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: database
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
      # volumesセクションを削除
