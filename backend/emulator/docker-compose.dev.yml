services:
  # Pub/Subエミュレータ
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: tiktok_pubsub
    ports:
      - "8681:8681"
    environment:
      - PUBSUB_PROJECT1=local-project,crawl-complete:process-crawl-complete-sub,process-account-list:process-urls-sub
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8681 --project=local-project
    # Windowsの場合はnetwork_modeを削除
    # network_mode: "host"

  # MySQLはローカルで実行しているため不要
  # mysql:
  #   image: mysql:8.0
  #   ...

  account-crawler:
    build:
      # Windowsパスの正しい表記
      context: C:/Users/kyoto/app/tik-analytics/Tiktok-analytics/backend/crawlers
      dockerfile: Dockerfile
    container_name: tiktok_account_crawler
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub:8681
      - PROJECT_ID=local-project
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=tiktok_user
      - MYSQL_PASSWORD=tiktok_pass
      - MYSQL_DATABASE=tiktok_data
    command: tail -f /dev/null
    depends_on:
      - pubsub
    # Windows Docker Desktopでは自動的にサポートされるが、念のため含める
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data: