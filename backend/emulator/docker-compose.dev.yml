services:
  # Pub/Subエミュレータ
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: tiktok_pubsub
    ports:
      - "8681:8681"
    environment:
      - PUBSUB_PROJECT1=local-project,crawl-complete:process-crawl-complete-sub,process-account-list:process-urls-sub,video-processing:video-processing-sub,video-data:video-data-sub
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8681 --project=local-project
    # Windowsの場合はnetwork_modeを削除
 
 # Cloud Storageエミュレータ
  storage:
    image: fsouza/fake-gcs-server
    container_name: tiktok_storage
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443"]
    volumes:
      - storage_data:/storage

