apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktok-analytics-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tiktok-analytics-api
  template:
    metadata:
      labels:
        app: tiktok-analytics-api
    spec:
      containers:
      - name: tiktok-analytics-api
        image: tiktok-analytics-api
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: tiktok-analytics-config
---
apiVersion: v1
kind: Service
metadata:
  name: tiktok-analytics-api
spec:
  selector:
    app: tiktok-analytics-api
  ports:
  - port: 8080
    targetPort: 8080
  type: NodePort 