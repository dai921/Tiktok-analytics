<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Analytics API テスト</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel { background: #f5f5f5; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 8px; width: 100%; max-width: 300px; box-sizing: border-box; }
        button { background: #0066ff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0052cc; }
        .result { background: #f0f8ff; border: 1px solid #d0e3ff; border-radius: 4px; padding: 15px; margin-top: 20px; overflow: auto; max-height: 600px; }
        .pagination { display: flex; margin-top: 20px; }
        .pagination button { margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { text-align: left; padding: 8px; }
        th { background-color: #f2f2f2; }
        .error { color: red; background: #ffeeee; padding: 10px; border-radius: 4px; margin-top: 20px; }
        td:first-child {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        td:first-child:hover {
            overflow: visible;
            white-space: normal;
            word-break: break-all;
            background-color: #f8f8f8;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TikTok Analytics API テスト画面</h1>
        
        <div class="panel">
            <h2>フィルタ・ソートオプション</h2>
            
            <div class="form-group">
                <label for="account_name">アカウント名：</label>
                <input type="text" id="account_name" placeholder="例: manami.yasetee">
            </div>
            
            <div class="form-group">
                <label for="category">カテゴリ：</label>
                <input type="text" id="category" placeholder="例: スキンケア">
            </div>
            
            <div class="form-group">
                <label for="hashtag">ハッシュタグ：</label>
                <input type="text" id="hashtag" placeholder="例: 垢抜け">
            </div>
            
            <div class="form-group">
                <label for="min_play_count">最小再生数：</label>
                <input type="number" id="min_play_count" placeholder="例: 1000">
            </div>
            
            <div class="form-group">
                <label for="min_likes_count">最小いいね数：</label>
                <input type="number" id="min_likes_count" placeholder="例: 100">
            </div>
            
            <div class="form-group">
                <label for="start_date">開始日：</label>
                <input type="date" id="start_date">
            </div>
            
            <div class="form-group">
                <label for="end_date">終了日：</label>
                <input type="date" id="end_date">
            </div>
            
            <div class="form-group">
                <label for="sort_by">ソート項目：</label>
                <select id="sort_by">
                    <option value="created_at">投稿日</option>
                    <option value="play_count">再生数</option>
                    <option value="likes_count">いいね数</option>
                    <option value="comment_count">コメント数</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="sort_order">ソート順：</label>
                <select id="sort_order">
                    <option value="desc">降順</option>
                    <option value="asc">昇順</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="limit">1ページあたりの件数：</label>
                <select id="limit">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            
            <button id="apply-button">適用</button>
            <button id="reset-button">リセット</button>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="results-panel" class="panel">
            <h2>検索結果 (<span id="total-count">0</span>件中 <span id="current-range">0-0</span>件を表示)</h2>
            
            <div class="pagination">
                <button id="prev-page" disabled>前へ</button>
                <span id="pagination-info">ページ: <span id="current-page">1</span> / <span id="total-pages">1</span></span>
                <button id="next-page" disabled>次へ</button>
            </div>
            
            <div id="table-container"></div>
            
            <details>
                <summary>JSON応答（詳細）</summary>
                <pre id="result" class="result">結果がここに表示されます</pre>
            </details>
        </div>
    </div>
    
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let totalItems = 0;
        
        // ページロード時の処理
        document.addEventListener('DOMContentLoaded', function() {
            // 適用ボタンのイベントリスナー
            document.getElementById('apply-button').addEventListener('click', function() {
                currentPage = 1;
                fetchData();
            });
            
            // リセットボタンのイベントリスナー
            document.getElementById('reset-button').addEventListener('click', function() {
                document.getElementById('account_name').value = '';
                document.getElementById('category').value = '';
                document.getElementById('hashtag').value = '';
                document.getElementById('min_play_count').value = '';
                document.getElementById('min_likes_count').value = '';
                document.getElementById('start_date').value = '';
                document.getElementById('end_date').value = '';
                document.getElementById('sort_by').value = 'created_at';
                document.getElementById('sort_order').value = 'desc';
                document.getElementById('limit').value = '10';
                currentPage = 1;
                fetchData();
            });
            
            // ページネーションボタンのイベントリスナー
            document.getElementById('prev-page').addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    fetchData();
                }
            });
            
            document.getElementById('next-page').addEventListener('click', function() {
                if (currentPage < totalPages) {
                    currentPage++;
                    fetchData();
                }
            });
            
            // 初期データ取得
            fetchData();
        });
        
        // APIからデータを取得する関数
        function fetchData() {
            const accountName = document.getElementById('account_name').value;
            const category = document.getElementById('category').value;
            const hashtag = document.getElementById('hashtag').value;
            const minPlayCount = document.getElementById('min_play_count').value;
            const minLikesCount = document.getElementById('min_likes_count').value;
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            const sortBy = document.getElementById('sort_by').value;
            const sortOrder = document.getElementById('sort_order').value;
            const limit = document.getElementById('limit').value;
            
            // URLパラメータを構築
            let params = new URLSearchParams({
                page: currentPage,
                limit: limit,
                sort_by: sortBy,
                sort_order: sortOrder
            });
            
            if (accountName) params.append('account_name', accountName);
            if (category) params.append('category', category);
            if (hashtag) params.append('hashtag', hashtag);
            if (minPlayCount) params.append('min_play_count', minPlayCount);
            if (minLikesCount) params.append('min_likes_count', minLikesCount);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            
            // API呼び出し
            fetch(`/videos?${params.toString()}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`API error: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('API response:', data);
                    document.getElementById('error').style.display = 'none';
                    
                    // 結果をJSON表示
                    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                    
                    // ページネーション情報を更新
                    totalItems = data.total || 0;
                    totalPages = data.totalPages || 1;
                    
                    document.getElementById('total-count').textContent = totalItems;
                    document.getElementById('current-page').textContent = currentPage;
                    document.getElementById('total-pages').textContent = totalPages;
                    
                    const startItem = (currentPage - 1) * parseInt(limit) + 1;
                    const endItem = Math.min(startItem + parseInt(limit) - 1, totalItems);
                    document.getElementById('current-range').textContent = `${totalItems > 0 ? startItem : 0}-${endItem}`;
                    
                    // ページネーションボタンの状態を更新
                    document.getElementById('prev-page').disabled = currentPage <= 1;
                    document.getElementById('next-page').disabled = currentPage >= totalPages;
                    
                    // テーブル表示
                    renderTable(data.data || []);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('error').textContent = `エラー: ${error.message}`;
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('result').textContent = `エラーが発生しました: ${error.message}`;
                });
        }
        
        // データをテーブル表示する関数
        function renderTable(data) {
            const tableContainer = document.getElementById('table-container');
            
            if (data.length === 0) {
                tableContainer.innerHTML = '<p>該当するデータがありません。</p>';
                return;
            }
            
            let html = '<table>';
            html += '<thead><tr>';
            html += '<th>URL</th>';
            html += '<th>アカウント</th>';
            html += '<th>カテゴリ</th>';
            html += '<th>サムネイル</th>';
            html += '<th>投稿日</th>';
            html += '<th>再生数</th>';
            html += '<th>いいね数</th>';
            html += '<th>コメント数</th>';
            html += '<th>ハッシュタグ</th>';
            html += '<th>音楽情報</th>';
            html += '</tr></thead>';
            
            html += '<tbody>';
            data.forEach(item => {
                html += '<tr>';
                html += `<td>${item.url}</td>`;
                html += `<td>${item.account_name}</td>`;
                html += `<td>${item.category}</td>`;
                html += `<td><img src="${item.thumbnail}" alt="サムネイル" width="80" /></td>`;
                html += `<td>${formatDate(item.created_at)}</td>`;
                html += `<td>${formatNumber(item.play_count)}</td>`;
                html += `<td>${formatNumber(item.likes_count)}</td>`;
                html += `<td>${formatNumber(item.comment_count)}</td>`;
                html += `<td>${(item.hashtags || []).join(', ')}</td>`;
                html += `<td>${item.music_info?.title || ''}</td>`;
                html += '</tr>';
            });
            html += '</tbody></table>';
            
            tableContainer.innerHTML = html;
        }
        
        // 数値のフォーマット
        function formatNumber(num) {
            return new Intl.NumberFormat().format(num);
        }
        
        // 日付のフォーマット
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ja-JP');
        }
    </script>
</body>
</html>
