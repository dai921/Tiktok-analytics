apiVersion: v1
kind: ConfigMap
metadata:
  name: tiktok-analytics-config
  namespace: default
data:
  MYSQL_HOST: "your-mysql-host"
  MYSQL_USER: "your-mysql-user"
  MYSQL_DATABASE: "your-database"
  MYSQL_PORT: "3306"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktok-analytics-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tiktok-analytics-api
  template:
    metadata:
      labels:
        app: tiktok-analytics-api
    spec:
      containers:
      - name: tiktok-analytics-api
        image: tiktok-analytics-api
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: tiktok-analytics-config
---
apiVersion: v1
kind: Service
metadata:
  name: tiktok-analytics-api
  namespace: default
spec:
  selector:
    app: tiktok-analytics-api
  ports:
  - port: 8080
    targetPort: 8080
  type: NodePort 