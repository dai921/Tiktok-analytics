apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: backend-service
  annotations:
    run.googleapis.com/launch-stage: "GA"
    run.googleapis.com/region: asia-northeast1          # ← リージョンを必ず明示
    autoscaling.knative.dev/maxScale: "50"              # --max-instances
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/vpc-access-connector: projects/tiktok-analytics-prod-451609/locations/asia-northeast1/connectors/run-conn
        run.googleapis.com/vpc-access-egress: all-traffic      # または private-ranges-only
        run.googleapis.com/container-concurrency: "500" # --concurrency
    spec:
      serviceAccountName: cloudbuild@tiktok-analytics-prod-451609.iam.gserviceaccount.com
      containers:
      # ────────── Ingress (HTTP) ──────────
      - name: backend
        image: asia-northeast1-docker.pkg.dev/tiktok-analytics-prod-451609/backend-repo/backend:1105
        ports:
          - name: http1
            containerPort: 8080                        # 1 つだけポートを公開
        env:
          - name: MYSQL_HOST
            value: 127.0.0.1
          - name: MYSQL_PORT
            value: "3306"
          - name: MYSQL_USER
            value: tiktok-user
          - name: MYSQL_PASSWORD
            value: tiktok_pass
          - name: MYSQL_DATABASE
            value: tiktok_data
          - name: PROJECT_ID
            value: tiktok-analytics-prod-451609
          - name: VIDEO_DOWNLOADER_PUBSUB_TOPIC
            value: video-download-tasks
          - name: ALLOWED_ORIGINS
            value: >-
              https://app.buzzmiru.com
          - name: TT_CLIENT_KEY
            valueFrom:
              secretKeyRef:
                name: TT_CLIENT_KEY
                key: latest
          - name: TT_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: TT_CLIENT_SECRET
                key: latest
          - name: BASE_URL
            value: https://app.buzzmiru.com
          - name: JWT_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: JWT_SECRET_KEY
                key: latest
          - name: ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: ENCRYPTION_KEY
                key: latest
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
      # ────────── Cloud SQL Auth Proxy ──────────
      - name: proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.16.0
        args:
          - "--structured-logs"
          - "--port=3306"
          - "--private-ip"
          - "tiktok-analytics-prod-451609:asia-northeast1:tiktok-analytics-db"
        # ＊ポートは定義しない（EXPOSE も無し）→重複ポートエラーを回避
        resources:
          limits:
            cpu: "0.25"
            memory: 512Mi
